<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanh toán thành công | Clow Cat Patronus</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css?v=20260616-sepay-success" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(9, 28, 32, 0.78), rgba(9, 28, 32, 0.88)),
        url("assets/images/hero_bg.webp") center / cover fixed;
    }
    .bmodal-inner {
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      position: relative;
    }
    .btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="bmodal-inner success-inner">
    <div class="success-anim">
      <div class="success-circle">
        <i class="fa-solid fa-check"></i>
      </div>
      <div class="success-stars">
        <span>✦</span><span>★</span><span>✦</span>
      </div>
    </div>
    <h2>Thanh toán thành công</h2>
    <p style="color: var(--color-white-80); margin-bottom: 32px; line-height: 1.6; font-size: 1.05rem; text-align: center;">
      Cảm ơn bạn đã đặt lịch tư vấn. Hệ thống đã ghi nhận thanh toán và tụi mình sẽ gửi email xác nhận lịch hẹn cho bạn trong ít phút.
    </p>
    <div class="success-action-buttons">
      <a href="index.html#contact" class="btn success-home-btn">
        <span>Về trang đặt lịch</span>
      </a>
      <a href="https://www.facebook.com/clowcatpatronus" target="_blank" rel="noopener" class="btn success-fanpage-btn">
        <i class="fab fa-facebook-messenger"></i>
        <span>Nhắn fanpage</span>
      </a>
    </div>
  </div>
</body>
</html>
